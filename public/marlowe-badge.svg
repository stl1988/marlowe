<svg xmlns="http://www.w3.org/2000/svg" width="154" height="20" role="img" aria-label="✒️ Edit with: Marlowe">
  <title>✒️ Edit with: Marlowe</title>
  <defs>
    <mask id="round">
      <rect width="154" height="20" rx="3" fill="#fff"/>
    </mask>
    <linearGradient id="shine" x2="0" y2="100%">
      <stop offset="0" stop-color="#fff" stop-opacity=".2"/>
      <stop offset="0.1" stop-color="#fff" stop-opacity=".05"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g mask="url(#round)">
    <!-- Left label background -->
    <rect width="78" height="20" fill="#555"/>
    <!-- Right label background (Marlowe teal) -->
    <rect x="78" width="76" height="20" fill="#0d9488"/>
    <rect width="154" height="20" fill="url(#shine)"/>
  </g>

  <!-- Text -->
  <g fill="#fff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,Ubuntu,Cantarell,Noto Sans,sans-serif" font-size="11">
    <text x="39" y="14">✒️ Edit with</text>
    <text x="116" y="14" font-weight="600">Marlowe</text>
  </g>
</svg>
